<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocky</title>



  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #cdeccf, #b7e4c7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 22px;
      margin: 6px 0;
      font-weight: 700;
    }

    .subscribers {
      font-size: 14px;
      color: #777;
      margin-bottom: 14px;
    }

    .bio {
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      margin-bottom: 22px;
    }

    .join-btn {
      display: inline-block;
      width: 100%;
      padding: 14px 0;
      background: #2aabee;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      text-decoration: none;
    }

    .telegram-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #f6f6f6;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .download-btn {
      background: #2aabee;
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      text-decoration: none;
    }
  </style>


</head>

<body>

  <div class="telegram-bar">
    <span>Telegram</span>
    <a href="https://telegram.org" target="_blank" class="download-btn">DOWNLOAD</a>
  </div>

  <div class="card">
    <img src="rock.jpg" alt="Ronny Bhai" class="avatar" />

    <h1> Rocky</h1>
    <div class="subscribers">90,027 subscribers</div>

    <div class="bio">
     
      Always free Cricket Predictions 🏏<br>
	  ORIGINAL LINK 👇<br>

    </div>

    <a
      href="https://t.me/+vEUvcbB3oMRiMDY1"
      target="_blank"
      class="join-btn"
      onclick="fbq('track','Subscribe');"
    >
      JOIN CHANNEL
    </a>

    <p style="margin-top:12px;font-size:13px;color:#888;">
      You’ll be redirected automatically in 20 seconds…
    </p>
  </div>

</body>
</html>
